<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSF Eastern Africa Donation Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="is-loading">
  <main class="page">
    <header class="hero reveal" data-reveal-order="0">
      <span class="wordmark">MSF</span>
      <h1>Support our mission</h1>
      <p class="hero-copy">Help us respond quickly where the need is greatest across Eastern Africa.</p>
    </header>

    <section class="security-banner reveal" data-reveal-order="1">
      <span class="security-dot" aria-hidden="true"></span>
      <p>Your info stays private and safe</p>
    </section>

    <form id="donation-form" novalidate>
      <section class="field-group reveal" data-reveal-order="2">
        <label for="full-name">Full name</label>
        <input type="text" class="form-control" id="full-name" name="name" placeholder="Jane Wanjiru" autocomplete="name">
        <p class="field-error" id="name-error" aria-live="polite"></p>
      </section>

      <section class="field-group reveal" data-reveal-order="3">
        <label for="email-address">Email address</label>
        <input type="email" class="form-control" id="email-address" name="email" placeholder="name@example.com" autocomplete="email">
        <p class="field-error" id="email-error" aria-live="polite"></p>
      </section>

      <section class="field-group reveal" data-reveal-order="4">
        <label>How much would you like to give?</label>
        <div class="preset-grid" role="group" aria-label="Preset donation amounts">
          <button type="button" class="preset-btn" data-amount="1000">KES 1,000</button>
          <button type="button" class="preset-btn" data-amount="2500">KES 2,500</button>
          <button type="button" class="preset-btn" data-amount="5000">KES 5,000</button>
          <button type="button" class="preset-btn" data-amount="10000">KES 10,000</button>
        </div>
        <label for="custom-amount" class="secondary-label">Or type your own amount</label>
        <input type="text" class="form-control" id="custom-amount" name="amount" inputmode="decimal" placeholder="0.00" autocomplete="off">
        <p class="field-error" id="amount-error" aria-live="polite"></p>

        <div class="amount-ledger" id="amount-ledger">
          <span class="ledger-label">Selected amount</span>
          <span class="ledger-value" id="ledger-value">Choose an amount</span>
        </div>
      </section>

      <section class="field-group reveal" data-reveal-order="5">
        <label>How often do you want to give?</label>
        <div class="radio-row">
          <label class="radio-option">
            <input type="radio" name="type" value="one-time" checked>
            <span>Just once</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="type" value="recurring">
            <span>Every month (or however often you choose)</span>
          </label>
        </div>

        <div class="frequency-field d-none" id="frequency-field">
          <label for="frequency">Select recurring frequency</label>
          <select class="form-select" id="frequency" name="frequency">
            <option value="monthly">Monthly</option>
            <option value="quarterly">Every 3 months</option>
            <option value="biannual">Every 6 months</option>
            <option value="yearly">Yearly</option>
          </select>
          <p class="field-error" id="frequency-error" aria-live="polite"></p>
        </div>
      </section>

      <section class="field-group reveal" data-reveal-order="6">
        <label>How do you want to pay?</label>
        <div class="radio-row">
          <label class="radio-option">
            <input type="radio" name="method" value="mpesa" checked>
            <span>M-Pesa</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="method" value="card">
            <span>Card</span>
          </label>
        </div>

        <div class="method-fields" id="mpesa-fields">
          <label for="mpesa-phone">Safaricom phone number</label>
          <input type="tel" class="form-control" id="mpesa-phone" name="mpesaPhone" inputmode="tel" placeholder="0712 345 678" autocomplete="tel">
          <p class="field-error" id="mpesa-phone-error" aria-live="polite"></p>
        </div>

        <div class="method-fields d-none" id="card-fields">
          <label for="card-number">Card number</label>
          <input type="text" class="form-control" id="card-number" name="cardNumber" inputmode="numeric" placeholder="4242 4242 4242 4242" autocomplete="cc-number">

          <div class="card-grid">
            <div>
              <label for="card-expiry">Expiry (MM/YY)</label>
              <input type="text" class="form-control" id="card-expiry" name="cardExpiry" inputmode="numeric" placeholder="MM/YY" autocomplete="cc-exp">
            </div>
            <div>
              <label for="card-cvv">CVV</label>
              <input type="text" class="form-control" id="card-cvv" name="cardCvv" inputmode="numeric" placeholder="123" autocomplete="cc-csc">
            </div>
          </div>
          <p class="field-error" id="card-error" aria-live="polite"></p>
        </div>

        <div class="notice d-none" id="mpesa-limit-notice" aria-live="polite"></div>
      </section>

      <section class="field-group reveal" data-reveal-order="7">
        <label class="radio-option">
          <input type="checkbox" id="accept-terms" name="acceptTerms">
          <span>I agree to the <a href="#">MSF donation guidelines</a>.</span>
        </label>
        <p class="field-error" id="terms-error" aria-live="polite"></p>
      </section>

      <section class="field-group reveal" data-reveal-order="8">
        <button type="submit" class="submit-btn" id="submit-button" disabled>
          <span class="spinner-border spinner-border-sm d-none" id="submit-spinner" aria-hidden="true"></span>
          <span id="submit-label">Donate now</span>
        </button>
      </section>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
